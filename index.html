<script>
    document.getElementById("pension").addEventListener("input", updateResults);

    updateResults();

    function updateResults() {
        const pension = parseFloat(document.getElementById("pension").value);

        if (!isNaN(pension)) {
            const pension = parseFloat(document.getElementById("pension").value);

            const csg1 = getCSGRate1(pension) * 0.985 * pension;
            const csg2 = getCSGRate2(pension) * 0.985 * pension;

            const pensionNet1 = pension; //calculatePensionAfterCSG(pension, getCSGRate1(pension));
            const pensionNet2 = getPensionPS(pension / (1 - getCSGRate1(pension)));
            const pensionNetAttal = ((1 - getCSGRate2(pension)) * pension) / (1 - getCSGRate1(pension));

            const difference = (pensionNet2 - pensionNet1) * 12;
            const differenceAttal = (pensionNetAttal - pensionNet1) * 12;
            const pensionBrutte = pension / (1 - getCSGRate1(pension));

            document.getElementById("pensionNet1").textContent = pensionNet1.toFixed(0);
            document.getElementById("pensionNet2").textContent = pensionNet2.toFixed(0);
            document.getElementById("difference").textContent = difference.toFixed(0);
            document.getElementById("pensionNetAttal").textContent = pensionNetAttal.toFixed(0);
            document.getElementById("differenceAttal").textContent = differenceAttal.toFixed(0);
        } else {
            document.getElementById("pensionNet1").textContent = "";
            document.getElementById("pensionNet2").textContent = "";
            document.getElementById("difference").textContent = "";
            document.getElementById("pensionNetAttal").textContent = "";
            document.getElementById("differenceAttal").textContent = "";
        }
    }

    function getCSGRate1(pension) {
        if (pension <= 1386) return 0;
        if (pension <= 1607) return 0.038;
        if (pension <= 2424) return 0.066;
        return 0.083;
    }

    function getCSGRate2(pension) {
        if (pension <= 409) return 0;
        if (pension <= 1110) return 0.038;
        if (pension <= 1607) return 0.055;
        if (pension <= 2485) return 0.075;
        if (pension <= 4985) return 0.092;
        if (pension <= 6651) return 0.112;
        return 0.132;
    }

    function getPensionPS(pension) {
        retainedCSG = 0
        if (pension > 1110) retainedCSG += 0.038 * (pension - 1110)
        if (pension > 1607) retainedCSG += 0.055 * (pension - 1607)
        if (pension > 2485) retainedCSG += 0.075 * (pension - 2485)
        if (pension > 4985) retainedCSG += 0.092 * (pension - 4985)
        if (pension > 6651) retainedCSG += 0.112 * (pension - 6651)
        return pension - retainedCSG;
    }

    function calculatePensionAfterCSG(pension, csgRate) {
        return pension * (1 - csgRate * 0.985);
    }

    function mySubmitFunction(e) {
    e.preventDefault();
    return false;
    }
</script>
